name: CI

# Opt into Node 24 for JS-based actions (checkout, setup-node) before the runner default flips.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Editr-FrontEnd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Editr-FrontEnd/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project + dev deps
        run: pip install -e ".[dev,api,mcp]"
      - name: Pytest
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, python]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: editr:ci
