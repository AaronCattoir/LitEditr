# Local beta: API + SPA with persistent SQLite under ./data
services:
  editr:
    build: .
    ports:
      # Bind to localhost only (avoid LAN exposure): "127.0.0.1:8000:8000"
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Model IDs (must match what your API key can call; same vars as .env / config.py)
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FAST_MODEL: ${GEMINI_FAST_MODEL:-gemini-2.5-flash}
      GEMINI_PRO_MODEL: ${GEMINI_PRO_MODEL:-gemini-2.5-flash}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_FAST_MODEL: ${OPENAI_FAST_MODEL:-gpt-5.4-mini}
      OPENAI_PRO_MODEL: ${OPENAI_PRO_MODEL:-gpt-5.4}
      EDITR_DIALECTIC_DEPTH: ${EDITR_DIALECTIC_DEPTH:-off}
      # Compose loads project `.env` for ${VAR} substitution. Keys above are passed into the container
      # (unlike bare `load_dotenv` alone when no .env file exists inside the image).
    volumes:
      - ./data:/app/data
